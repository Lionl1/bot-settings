<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Настройки бота</title>
    <!-- Подключаем библиотеку Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            /* Используем системные шрифты и переменные цветов Telegram */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--tg-theme-hint-color, #888888);
        }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: 400;
            color: var(--tg-theme-text-color, #000);
        }
        .checkbox-label input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

    <div class="form-group">
        <label for="trigger">Слово-триггер (для групп)</label>
        <input type="text" id="trigger" placeholder="Например: Нука">
    </div>

    <div class="form-group">
        <label for="mood">Настроение бота</label>
        <input type="text" id="mood" placeholder="Например: очень саркастичный">
    </div>

    <div class="form-group">
        <label for="prompt">Дополнительный системный промпт</label>
        <textarea id="prompt" placeholder="Любые дополнительные инструкции..."></textarea>
    </div>

    <div class="form-group">
        <label for="max_tokens">Лимит ответа (в токенах)</label>
        <input type="number" id="max_tokens" value="4096">
    </div>

        <div class="form-group">
        <label>Голосовой ответ (Silero TTS)</label>
        <select id="voice">
            <option value="false">Выключен</option>
            <option value="kseniya">Ксения (Женский 1)</option>
            <option value="xenia">Ксения 2 (Женский 2)</option>
            <option value="baya">Байя (Женский 3)</option>
            <option value="aidar">Айдар (Мужской 1)</option>
            <option value="eugene">Евгений (Мужской 2)</option>
            <option value="random">Случайный голос</option>
        </select>
    </div>


    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" id="syntax"> Включить проверку синтаксиса
        </label>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на весь экран

        // Читаем текущие настройки, которые бот передал в URL
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.has('trigger_word')) {
            document.getElementById('trigger').value = urlParams.get('trigger_word');
        }
        if (urlParams.has('mood')) {
            document.getElementById('mood').value = urlParams.get('mood');
        }
        if (urlParams.has('extra_prompt')) {
            document.getElementById('prompt').value = urlParams.get('extra_prompt');
        }
        if (urlParams.has('max_tokens')) {
            document.getElementById('max_tokens').value = urlParams.get('max_tokens');
        }
        if (urlParams.has('voice_response')) {
            document.getElementById('voice').value = urlParams.get('voice_response');
        }
        if (urlParams.has('check_syntax')) {
            document.getElementById('syntax').checked = urlParams.get('check_syntax') === 'true';
        }

        // Показываем главную кнопку Telegram
        tg.MainButton.text = "СОХРАНИТЬ";
        tg.MainButton.show();

        // Обрабатываем нажатие кнопки "СОХРАНИТЬ"
        tg.onEvent('mainButtonClicked', function() {
            let voiceVal = document.getElementById("voice").value;
            if (voiceVal === "false") voiceVal = false;

            // Собираем данные из формы
            const data = {
                trigger_word: document.getElementById("trigger").value || "Нука",
                mood: document.getElementById("mood").value,
                extra_prompt: document.getElementById("prompt").value,
                max_tokens: document.getElementById("max_tokens").value || 4096,
                voice_response: voiceVal,
                check_syntax: document.getElementById("syntax").checked
            };
            
            // Отправляем JSON обратно в бота
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
