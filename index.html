<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Настройки бота</title>
    <!-- Подключаем библиотеку Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .highlight-box {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 2px solid var(--tg-theme-button-color, #3390ec);
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--tg-theme-hint-color, #888888);
        }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: 400;
            color: var(--tg-theme-text-color, #000);
        }
        .checkbox-label input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

    <!-- БЛОК ВЫБОРА ЧАТА -->
    <div class="form-group highlight-box">
        <label for="chat_selector" style="color: var(--tg-theme-button-color, #3390ec);">Настраиваемый чат:</label>
        <select id="chat_selector" style="font-weight: bold; border-color: transparent; background-color: transparent; outline: none; padding: 5px 0;"></select>
    </div>

    <div class="form-group">
        <label for="trigger">Имя бота / Триггер (Определяет пол)</label>
        <input type="text" id="trigger" placeholder="Например: Алиса">
    </div>

    <div class="form-group">
        <label for="mood">Настроение бота</label>
        <input type="text" id="mood" placeholder="Например: очень саркастичный">
    </div>

    <div class="form-group">
        <label for="prompt">Дополнительный системный промпт</label>
        <textarea id="prompt" placeholder="Любые дополнительные инструкции..."></textarea>
    </div>

    <div class="form-group">
        <label for="max_tokens">Лимит ответа (в токенах)</label>
        <input type="number" id="max_tokens" value="4096">
    </div>

    <div class="form-group">
        <label>Голосовой ответ (Silero TTS)</label>
        <select id="voice">
            <option value="false">Выключен</option>
            <option value="kseniya">Ксения (Женский 1)</option>
            <option value="xenia">Ксения 2 (Женский 2)</option>
            <option value="baya">Байя (Женский 3)</option>
            <option value="aidar">Айдар (Мужской 1)</option>
            <option value="eugene">Евгений (Мужской 2)</option>
            <option value="random">Случайный голос</option>
        </select>
    </div>

    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" id="syntax"> Включить проверку синтаксиса
        </label>
    </div>
    
    <div class="form-group" style="margin-top: 24px;">
        <button id="reset_btn" style="background-color: var(--tg-theme-destructive-text-color, #ff3b30); color: #fff; width: 100%; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
            🔄 Сбросить настройки чата
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на весь экран

        const urlParams = new URLSearchParams(window.location.search);
        let config = { current: null, chats: [] };
        
        // Разбираем JSON с чатами, который передал бот
        if (urlParams.has('config')) {
            try {
                config = JSON.parse(urlParams.get('config'));
            } catch(e) {
                console.error("Failed to parse config", e);
            }
        }

        const chatSelector = document.getElementById('chat_selector');
        
        // Заполняем выпадающий список группами
        if (config.chats && config.chats.length > 0) {
            config.chats.forEach(chat => {
                let opt = document.createElement('option');
                opt.value = chat.id;
                opt.textContent = chat.title;
                chatSelector.appendChild(opt);
            });
            if (config.current) {
                chatSelector.value = config.current;
            }
        } else {
            let opt = document.createElement('option');
            opt.textContent = "Обновите меню бота";
            chatSelector.appendChild(opt);
        }

        // Функция подстановки данных при выборе чата
        function loadChatSettings(chatId) {
            const chat = config.chats.find(c => c.id == chatId);
            if (!chat) return;
            document.getElementById('trigger').value = chat.tw || "Нука";
            document.getElementById('mood').value = chat.md || "";
            document.getElementById('prompt').value = chat.ep || "";
            document.getElementById('max_tokens').value = chat.mt || 4096;
            document.getElementById('voice').value = chat.vr || "false";
            document.getElementById('syntax').checked = chat.cs === true;
        }

        // Инициализируем форму
        if (config.chats.length > 0) {
            loadChatSettings(chatSelector.value);
        }

        // Слушаем изменение группы в селекторе и меняем значения в полях
        chatSelector.addEventListener('change', function() {
            loadChatSettings(this.value);
        });

        tg.MainButton.text = "СОХРАНИТЬ";
        tg.MainButton.show();

        // Обработка кнопки Сброса
        document.getElementById('reset_btn').addEventListener('click', function() {
            tg.showConfirm("Вы уверены, что хотите сбросить настройки выбранного чата к значениям по умолчанию?", function(confirmed) {
                if (confirmed) {
                    const data = {
                        action: "reset",
                        chat_id: chatSelector.value
                    };
                    tg.sendData(JSON.stringify(data));
                }
            });
        });

        // Обрабатываем нажатие главной кнопки "СОХРАНИТЬ"
        tg.onEvent('mainButtonClicked', function() {
            let voiceVal = document.getElementById("voice").value;
            if (voiceVal === "false") voiceVal = false;

            const data = {
                chat_id: chatSelector.value,
                trigger_word: document.getElementById("trigger").value || "Нука",
                mood: document.getElementById("mood").value,
                extra_prompt: document.getElementById("prompt").value,
                max_tokens: document.getElementById("max_tokens").value || 4096,
                voice_response: voiceVal,
                check_syntax: document.getElementById("syntax").checked
            };
            
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
